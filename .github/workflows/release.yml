name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install frontend dependencies
        run: npm ci

      - name: Fetch sing-box core
        shell: pwsh
        run: |
          $infoUrl = 'https://raw.githubusercontent.com/lurixo/sing-box-releases/dev/singbox-build-info.json'
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          Invoke-WebRequest -Uri $infoUrl -OutFile stage/singbox-build-info.json
          $info = Get-Content stage/singbox-build-info.json -Raw | ConvertFrom-Json
          $url = "https://github.com/lurixo/sing-box-releases/releases/download/v$($info.version)/$($info.windows_asset)"
          Write-Host "Downloading core $($info.version) from $url"
          Invoke-WebRequest -Uri $url -OutFile core.zip
          $actual = (Get-FileHash core.zip -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $info.windows_sha256.ToLower()) {
            throw "core checksum mismatch: expected $($info.windows_sha256) got $actual"
          }
          Expand-Archive -Path core.zip -DestinationPath core_extract -Force
          $exe = Get-ChildItem -Path core_extract -Recurse -Filter sing-box.exe | Select-Object -First 1
          if (-not $exe) { throw "sing-box.exe not found in archive" }
          Copy-Item $exe.FullName stage/sing-box.exe

      - name: Build Tauri app (portable, no installer)
        run: npx tauri build --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Generate Maestro build info
        shell: pwsh
        run: |
          $exe = "src-tauri/target/release/Maestro.exe"
          $sha = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          $builtAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          $asset = "maestro-${{ steps.version.outputs.VERSION }}-portable.zip"
          $info = [ordered]@{
            version        = "${{ steps.version.outputs.VERSION }}"
            windows_asset  = $asset
            windows_sha256 = $sha
            built_at       = $builtAt
            run_id         = "${{ github.run_id }}"
          }
          # ASCII (no BOM) so serde_json on the client parses it cleanly. Hash is
          # over Maestro.exe — the binary the self-update verifies and swaps in.
          $info | ConvertTo-Json | Set-Content -Path stage/maestro-build-info.json -Encoding ascii
          Write-Host ($info | ConvertTo-Json -Compress)

      - name: Assemble portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          New-Item -ItemType Directory -Force -Path portable/data | Out-Null
          Copy-Item src-tauri/target/release/Maestro.exe portable/
          Copy-Item stage/sing-box.exe portable/data/
          Copy-Item stage/singbox-build-info.json portable/data/
          Copy-Item stage/maestro-build-info.json portable/data/
          Copy-Item src-tauri/resources/EnableLoopback.exe portable/data/
          Compress-Archive -Path portable/* -DestinationPath "maestro-${{ steps.version.outputs.VERSION }}-portable.zip" -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Maestro v${{ steps.version.outputs.VERSION }}"
          generate_release_notes: true
          files: |
            maestro-*-portable.zip
            stage/maestro-build-info.json
          draft: false
          # A tag with a pre-release suffix (e.g. v1.0.0-rc.1) is marked as such.
          prerelease: ${{ contains(github.ref_name, '-') }}
