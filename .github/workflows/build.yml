name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        run: npm install

      - name: Fetch sing-box core
        shell: pwsh
        run: |
          $infoUrl = 'https://raw.githubusercontent.com/lurixo/sing-box-releases/dev/singbox-build-info.json'
          New-Item -ItemType Directory -Force -Path stage | Out-Null
          Invoke-WebRequest -Uri $infoUrl -OutFile stage/singbox-build-info.json
          $info = Get-Content stage/singbox-build-info.json -Raw | ConvertFrom-Json
          $url = "https://github.com/lurixo/sing-box-releases/releases/download/v$($info.version)/$($info.windows_asset)"
          Write-Host "Downloading core $($info.version) from $url"
          Invoke-WebRequest -Uri $url -OutFile core.zip
          $actual = (Get-FileHash core.zip -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $info.windows_sha256.ToLower()) {
            throw "core checksum mismatch: expected $($info.windows_sha256) got $actual"
          }
          Expand-Archive -Path core.zip -DestinationPath core_extract -Force
          $exe = Get-ChildItem -Path core_extract -Recurse -Filter sing-box.exe | Select-Object -First 1
          if (-not $exe) { throw "sing-box.exe not found in archive" }
          Copy-Item $exe.FullName stage/sing-box.exe

      - name: Build Tauri app (portable, no installer)
        run: npx tauri build --no-bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""

      - name: Assemble portable package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path portable | Out-Null
          Copy-Item src-tauri/target/release/sing-box-launcher.exe portable/
          Copy-Item stage/sing-box.exe portable/
          Copy-Item stage/singbox-build-info.json portable/
          Copy-Item src-tauri/resources/EnableLoopback.exe portable/
          Compress-Archive -Path portable/* -DestinationPath sing-box-launcher-portable.zip -Force

      - name: Upload portable artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sing-box-launcher-portable
          path: sing-box-launcher-portable.zip
          retention-days: 7
